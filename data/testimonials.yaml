- Name: Timothy Lehnen
  Role: Project Manager
  Entity: Drupal Association
  URL: https://association.drupal.org
  Text: |
    Oliver and I worked together very closely on several projects at the Drupal Association - ranging from providing tools to better help our existing community members welcome new users to Drupal.org, to improving online elections process for community-elected board members, to working closely with community members to finish porting Drupal.org's localization sub-site to Drupal 7.

    As the Project Manager for the Drupal Association, I've found Oliver's skill-set invaluable. He has the depth of knowledge to dive into sophisticated projects with a minimum of ramp up time. He has the breadth of knowledge to transition rapidly to different product areas - wherever we need greater velocity.

    When necessary, he's been able to pinch-hit for us on any project, internal or community driven, that we've thrown at him - while at the same time managing any primary projects that he's been assigned. And he's managed all of that while working remotely, maintaining great communication with the rest of our team.

    All of this alone would be enough for me to heartily recommend Oliver to anyone in need of a experienced Drupal Developer. But beyond even that Oliver has an amiable personality and team-focused outlook that make him a pleasure to work with.

    I would work with him again without reservation or hesitation.

